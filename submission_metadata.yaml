# <=200 words. Strongly recommended (helps at Stage 4 review).
methodology_summary: >
  We treat candidate ranking as JD-INTENT matching, not keyword matching. A TF-IDF
  semantic layer scores each candidate's career narrative against a hand-written
  JD-intent query (CPU-only, no network, satisfies the 5-min Stage-3 budget). On top
  of that we compute interpretable features that read what the JD MEANS: the four
  must-have skill areas are detected both via explicit terminology AND via
  plain-language evidence in career descriptions, so a genuine Tier-5 engineer who
  never writes "RAG" still gets credit, while a keyword-stuffer with a non-engineering
  title does not. The JD's explicit "do NOT want" list (services-only careers,
  research-only with no production, recent LangChain-only, job-hoppers, CV/speech
  without NLP) becomes graded penalties, and Redrob behavioral signals (recency,
  recruiter response, open-to-work, notice period) act as an availability multiplier.
  Honeypots are zeroed by detecting internal arithmetic impossibilities (0% reach our
  top-100). Reasoning strings are extractive from real profile fields (no
  hallucination). We validate offline with a transparent JD-derived proxy oracle plus
  a feature-ablation study (eval/evaluate.py).
